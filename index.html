  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

x;flex-direction:column;justify-content:center;gap:4px\">\n          <span style=\"font-size:20px;font-weight:800;color:#FFFFFF;line-height:1.15\">One-off setup<\u002Fspan>\n          <span style=\"font-size:13px;font-weight:600;color:rgba(255,255,255,.82);letter-spacing:.02em\">Done once<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"background:#EFF2F3;border:1px solid #D5DDDF;border-radius:8px;padding:13px 15px;display:{{ ownerDisp.board }};align-items:flex-start;gap:10px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#1B6B7D;flex:none;margin-top:6px\"><\u002Fspan><span style=\"font-size:17px;line-height:1.3;color:#222222\">45-minute board discussion<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#EFF2F3;border:1px solid #D5DDDF;border-radius:8px;padding:13px 15px;display:{{ ownerDisp.slt }};align-items:flex-start;gap:10px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#1B6B7D;flex:none;margin-top:6px\"><\u002Fspan><span style=\"font-size:17px;line-height:1.3;color:#222222\">Draft policy v1 from template<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#EFF2F3;border:1px solid #D5DDDF;border-radius:8px;padding:13px 15px;display:{{ ownerDisp.slt }};align-items:flex-start;gap:10px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#1B6B7D;flex:none;margin-top:6px\"><\u002Fspan><span style=\"font-size:17px;line-height:1.3;color:#222222\">Stand up the Approved AI Tools Register<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#EFF2F3;border:1px solid #D5DDDF;border-radius:8px;padding:13px 15px;display:{{ ownerDisp.grey }};align-items:flex-start;gap:10px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#1B6B7D;flex:none;margin-top:6px\"><\u002Fspan><span style=\"font-size:17px;line-height:1.3;color:#222222\">Update the privacy notice<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#EFF2F3;border:1px solid #D5DDDF;border-radius:8px;padding:13px 15px;display:{{ ownerDisp.board }};align-items:flex-start;gap:10px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#1B6B7D;flex:none;margin-top:6px\"><\u002Fspan><span style=\"font-size:17px;line-height:1.3;color:#222222\">Board approval<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Column 2: Decide-once -->\n      <div style=\"flex:1;min-width:0;display:{{ colDisp.decide }};flex-direction:column;gap:12px\">\n        <div style=\"background:rgba(27,107,125,.80);border-radius:9px;padding:14px 16px;min-height:96px;display:flex;flex-direction:column;justify-content:center;gap:4px\">\n          <span style=\"font-size:20px;font-weight:800;color:#FFFFFF;line-height:1.15\">Decide-once<\u002Fspan>\n          <span style=\"font-size:13px;font-weight:600;color:rgba(255,255,255,.85);letter-spacing:.02em\">Set once · reviewed yearly<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"background:#EFF2F3;border:1px solid #D5DDDF;border-radius:8px;padding:13px 15px;display:{{ ownerDisp.board }};align-items:flex-start;gap:10px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#1B6B7D;flex:none;margin-top:6px\"><\u002Fspan><span style=\"font-size:17px;line-height:1.3;color:#222222\">The school’s AI position<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#EFF2F3;border:1px solid #D5DDDF;border-radius:8px;padding:13px 15px;display:{{ ownerDisp.board }};align-items:flex-start;gap:10px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#1B6B7D;flex:none;margin-top:6px\"><\u002Fspan><span style=\"font-size:17px;line-height:1.3;color:#222222\">The “never permit” hard rules<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#EFF2F3;border:1px solid #D5DDDF;border-radius:8px;padding:13px 15px;display:{{ ownerDisp.slt }};align-items:flex-start;gap:10px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#1B6B7D;flex:none;margin-top:6px\"><\u002Fspan><span style=\"font-size:17px;line-height:1.3;color:#222222\">Risk thresholds<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#EFF2F3;border:1px solid #D5DDDF;border-radius:8px;padding:13px 15px;display:{{ ownerDisp.board }};align-items:flex-start;gap:10px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#1B6B7D;flex:none;margin-top:6px\"><\u002Fspan><span style=\"font-size:17px;line-height:1.3;color:#222222\">Te Tiriti / Māori data sovereignty position<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Column 3: Per-event -->\n      <div style=\"flex:1;min-width:0;display:{{ colDisp.perevent }};flex-direction:column;gap:12px\">\n        <div style=\"background:rgba(27,107,125,.58);border-radius:9px;padding:14px 16px;min-height:96px;display:flex;flex-direction:column;justify-content:center;gap:4px\">\n          <span style=\"font-size:19px;font-weight:800;color:#FFFFFF;line-height:1.15\">Per-event — triggered &amp; rare<\u002Fspan>\n          <span style=\"font-size:13px;font-weight:600;color:rgba(255,255,255,.9);letter-spacing:.02em\">Only when something changes<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"background:#EFF2F3;border:1px solid #D5DDDF;border-radius:8px;padding:13px 15px;display:{{ ownerDisp.grey }};align-items:flex-start;gap:10px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#1B6B7D;flex:none;margin-top:6px\"><\u002Fspan><span style=\"font-size:17px;line-height:1.3;color:#222222\">PIA before a new tool<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#EFF2F3;border:1px solid #D5DDDF;border-radius:8px;padding:13px 15px;display:{{ ownerDisp.grey }};align-items:flex-start;gap:10px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#1B6B7D;flex:none;margin-top:6px\"><\u002Fspan><span style=\"font-size:17px;line-height:1.3;color:#222222\">Add the tool to the register<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#EFF2F3;border:1px solid #D5DDDF;border-radius:8px;padding:13px 15px;display:{{ ownerDisp.slt }};align-items:flex-start;gap:10px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#1B6B7D;flex:none;margin-top:6px\"><\u002Fspan><span style=\"font-size:17px;line-height:1.3;color:#222222\">Incident response<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#EFF2F3;border:1px solid #D5DDDF;border-radius:8px;padding:13px 15px;display:{{ ownerDisp.slt }};align-items:flex-start;gap:10px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#1B6B7D;flex:none;margin-top:6px\"><\u002Fspan><span style=\"font-size:17px;line-height:1.3;color:#222222\">Annual review<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#EFF2F3;border:1px solid #D5DDDF;border-radius:8px;padding:13px 15px;display:{{ ownerDisp.slt }};align-items:flex-start;gap:10px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#1B6B7D;flex:none;margin-top:6px\"><\u002Fspan><span style=\"font-size:17px;line-height:1.3;color:#222222\">Whānau comms on a major change<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Column 4: Ongoing daily -->\n      <div style=\"flex:1;min-width:0;display:{{ colDisp.daily }};flex-direction:column;gap:12px\">\n        <div style=\"background:rgba(27,107,125,.42);border-radius:9px;padding:14px 16px;min-height:96px;display:flex;flex-direction:column;justify-content:center;gap:4px\">\n          <span style=\"font-size:20px;font-weight:800;color:#FFFFFF;line-height:1.15\">Ongoing — daily<\u002Fspan>\n          <span style=\"font-size:13px;font-weight:600;color:rgba(255,255,255,.95);letter-spacing:.02em\">Every day<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"background:#EFF2F3;border:2px solid #1B6B7D;border-radius:10px;padding:18px 18px 16px;display:{{ ownerDisp.amber }};flex-direction:column;gap:9px;box-shadow:0 3px 10px rgba(27,107,125,.16)\">\n          <span style=\"font-size:21px;font-weight:800;color:#1B6B7D;line-height:1.18\">Three Gates pre-use check<\u002Fspan>\n          <span style=\"font-size:15px;font-weight:600;color:#1B6B7D;line-height:1.35\">copyright · privacy · Māori data sovereignty<\u002Fspan>\n          <span style=\"align-self:flex-start;background:#1B6B7D;color:#FFFFFF;font-size:13px;font-weight:700;letter-spacing:.02em;padding:6px 11px;border-radius:6px;line-height:1.2\">The only new daily action · ~10 seconds<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"background:#EFF2F3;border:1px solid #D5DDDF;border-radius:8px;padding:12px 15px;display:{{ ownerDisp.amber }};align-items:flex-start;gap:10px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#1B6B7D;flex:none;margin-top:6px\"><\u002Fspan><span style=\"font-size:16px;line-height:1.3;color:#222222\">Verify important outputs<br><span style=\"font-size:13px;color:#7A8488;font-weight:600\">already routine<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"background:#EFF2F3;border:1px solid #D5DDDF;border-radius:8px;padding:12px 15px;display:{{ ownerDisp.amber }};align-items:flex-start;gap:10px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#1B6B7D;flex:none;margin-top:6px\"><\u002Fspan><span style=\"font-size:16px;line-height:1.3;color:#222222\">Disclose AI-shaped external content<br><span style=\"font-size:13px;color:#7A8488;font-weight:600\">already routine<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"background:#EFF2F3;border:1px solid #D5DDDF;border-radius:8px;padding:12px 15px;display:{{ ownerDisp.amber }};align-items:flex-start;gap:10px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#1B6B7D;flex:none;margin-top:6px\"><\u002Fspan><span style=\"font-size:16px;line-height:1.3;color:#222222\">Store work in the school tenancy<br><span style=\"font-size:13px;color:#7A8488;font-weight:600\">already routine<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <!-- Bottom takeaway strip -->\n    <div style=\"margin:0 -60px;background:#1B6B7D;padding:18px 60px;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;border-radius:0 0 6px 6px\">\n      <span style=\"font-size:19px;font-weight:600;color:#FFFFFF;text-align:center;line-height:1.4\">\n        <span style=\"font-weight:800\">19 obligations<\u002Fspan> · 5 one-off · 4 decide-once · 6 rare · 4 daily <span style=\"color:#BFE6D4\">(3 already routine)<\u002Fspan>.\n        <span style=\"color:#F8E7B6;font-weight:800\">The whole daily footprint is one 10-second check.<\u002Fspan>\n      <\u002Fspan>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1480,&quot;height&quot;:1000}}\">\nclass Component extends DCLogic {\n  state = {\n    col: { oneoff: true, decide: true, perevent: true, daily: true },\n    owner: { board: true, slt: true, grey: true, amber: true },\n  };\n\n  renderVals() {\n    const disp = (obj) => {\n      const o = {};\n      for (const k in obj) o[k] = obj[k] ? 'flex' : 'none';\n      return o;\n    };\n    const toggleCol = (k) => () =>\n      this.setState((s) => ({ col: { ...s.col, [k]: !s.col[k] } }));\n    const toggleOwner = (k) => () =>\n      this.setState((s) => ({ owner: { ...s.owner, [k]: !s.owner[k] } }));\n\n    return {\n      col: this.state.col,\n      owner: this.state.owner,\n      colDisp: disp(this.state.col),\n      ownerDisp: disp(this.state.owner),\n      colH: {\n        oneoff: toggleCol('oneoff'),\n        decide: toggleCol('decide'),\n        perevent: toggleCol('perevent'),\n        daily: toggleCol('daily'),\n      },\n      ownerH: {\n        board: toggleOwner('board'),\n        slt: toggleOwner('slt'),\n        grey: toggleOwner('grey'),\n        amber: toggleOwner('amber'),\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
